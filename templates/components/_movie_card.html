<div class="col-md-4 col-lg-3 mb-4">
    <div class="card h-100 shadow-sm border-0 bg-secondary bg-opacity-10">

        <a class="text-decoration-none" href="https://www.imdb.com/title/{{ movie.imdb_id }}/" target="_blank">
            <div class="position-relative">
                <img alt="{{ movie.title }} Poster"
                     class="card-img-top movie-poster"
                     src="{{ movie.poster_url if movie.poster_url and movie.poster_url != 'N/A' else 'https://via.placeholder.com/300x400?text=No+Poster' }}">

                <div class="card-img-overlay p-0 d-flex flex-column justify-content-start">
                    <h5 class="card-title title-overlay text-white p-3 m-0 text-center w-100 shadow">
                        {{ movie.title }}
                    </h5>
                </div>
            </div>
        </a>

        <div class="card-body d-flex flex-column">
            <p class="card-text mb-2">
                <small class="text-muted text-uppercase fw-bold">Director</small><br>
                {% if movie.director and movie.director.name %}
                <a class="text-primary text-decoration-none fw-semibold"
                   href="https://en.wikipedia.org/wiki/{{ movie.director.name | urlencode }}"
                   target="_blank">
                    {{ movie.director.name }}
                </a>
                {% elif movie.director_name %}
                {# Fallback if accessing dictionary data from search endpoint #}
                <a class="text-primary text-decoration-none fw-semibold"
                   href="https://en.wikipedia.org/wiki/{{ movie.director_name | urlencode }}"
                   target="_blank">
                    {{ movie.director_name }}
                </a>
                {% else %}
                <span class="text-secondary">Unknown</span>
                {% endif %}
            </p>

            <div class="d-flex justify-content-between align-items-center mt-auto">
                <span class="badge bg-dark border border-secondary">{{ movie.year }}</span>
                <span class="badge bg-primary text-wrap" style="max-width: 150px;">{{ movie.genre }}</span>
            </div>
        </div>
    </div>
</div>
